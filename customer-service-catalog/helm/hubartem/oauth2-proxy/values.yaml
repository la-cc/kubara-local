namespace:
  labels:
    project-name: "hubartem"
    stage: "dev"


externalSecrets:
  secretStoreRef:
    kind: ClusterSecretStore
    name: hubartem-dev

  secretStores:
    hubartem-dev:
      kind: ClusterSecretStore
      name: hubartem-dev

  secrets:
    oauth2-credentials:
      secretStoreRef: hubartem-dev
      dataFrom:
        - remoteKey: oauth2_credentials


oauth2-proxy:
  imagePullSecrets:
    - name: image-pull-secret
  config:
    existingSecret: oauth2-credentials
    configFile: |-
      reverse_proxy = true
      redirect_url = "https://hubartem-dev.stackit.run/oauth2/callback"
      email_domains = [ "*" ]
      cookie_secure = true
      upstreams = [ "static://200" ]
      github_org = "la-demos"
      github_team = "g-gitops"
      provider = "github"
      scope = "read:user user:email read:org"
  ingress:
    className: traefik
    annotations:

      cert-manager.io/cluster-issuer: letsencrypt-staging
    enabled: true
    path: /oauth2
    pathType: Prefix
    hosts:
      - hubartem-dev.stackit.run
    tls:
      - secretName: tls-oauth2-proxy
        hosts:
          - hubartem-dev.stackit.run
  metrics:
    serviceMonitor:
      enabled: true
      labels:
        monitoring.instance: "hubartem-dev"


middleware:
  name: oauth-auth
  namespace: oauth2-proxy

  forwardAuth:
    address: http://oauth2-proxy.oauth2-proxy.svc.cluster.local/oauth2/
    trustForwardHeader: true

    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - Authorization
