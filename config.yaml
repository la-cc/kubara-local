clusters:
  - name: hubartem
    stage: dev
    type: controlplane
    dnsName: hubartem-dev.stackit.run
    ssoOrg: la-demos
    ssoTeam: g-gitops
    ingressClassName: traefik
    terraform:
      provider: stackit
      projectId: 38867e9e-b5d4-4a85-97a8-0a944ab75b19
      kubernetesType: ske
      kubernetesVersion: "1.35"
      dns:
        name: hubartem-dev.stackit.run
        email: artem.lajko@iits-consulting.de
    argocd:
      repo:
        https:
          customer:
            url: https://github.com/la-cc/kubara-local.git
            targetRevision: main
          managed:
            url: https://github.com/la-cc/kubara-local.git
            targetRevision: main
    services:
      argocd:
        status: disabled
      certManager:
        status: enabled
        clusterIssuer:
          name: letsencrypt-staging
          email: artem.lajko@iits-consulting.de
          server: https://acme-staging-v02.api.letsencrypt.org/directory
      externalDns:
        status: enabled
      externalSecrets:
        status: enabled
      kubePrometheusStack:
        status: enabled
      traefik:
        status: enabled
      kyverno:
        status: enabled
      kyvernoPolicies:
        status: enabled
      kyvernoPolicyReport:
        status: enabled
      loki:
        status: enabled
      homerDashboard:
        status: enabled
      oauth2Proxy:
        status: enabled
      metricsServer:
        status: disabled
      metalLb:
        status: disabled
      longhorn:
        status: disabled
